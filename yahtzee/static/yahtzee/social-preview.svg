<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Game Hub social preview</title>
  <desc id="desc">Preview card for Game Hub featuring Yahtzee and The Maths Square.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151f3a"/>
      <stop offset="55%" stop-color="#2d4f8f"/>
      <stop offset="100%" stop-color="#f27a54"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="160" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="150" cy="560" r="180" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="70" y="70" width="1060" height="490" rx="34" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="110" y="165" fill="#f7fbff" font-size="42" font-family="Verdana, Arial, sans-serif" letter-spacing="6">GAME HUB</text>
  <text x="110" y="285" fill="#ffffff" font-size="96" font-weight="700" font-family="Verdana, Arial, sans-serif">Play Yahtzee Online</text>
  <text x="110" y="360" fill="#d7e8ff" font-size="46" font-family="Verdana, Arial, sans-serif">Rules, scoring, and quick browser puzzle games</text>
  <g transform="translate(110 420)">
    <rect width="250" height="78" rx="20" fill="#ffffff" fill-opacity="0.12"/>
    <text x="34" y="50" fill="#ffffff" font-size="38" font-family="Verdana, Arial, sans-serif">Yahtzee</text>
    <text x="188" y="50" fill="#ffd56a" font-size="42">🎲</text>
  </g>
  <g transform="translate(390 420)">
    <rect width="390" height="78" rx="20" fill="#ffffff" fill-opacity="0.12"/>
    <text x="32" y="50" fill="#ffffff" font-size="38" font-family="Verdana, Arial, sans-serif">The Maths Square</text>
    <text x="332" y="50" fill="#9ff2dd" font-size="42">🔢</text>
  </g>
  <text x="110" y="540" fill="#ffe7ca" font-size="30" font-family="Verdana, Arial, sans-serif">game hub for dice play, rules, and puzzle practice</text>
</svg>